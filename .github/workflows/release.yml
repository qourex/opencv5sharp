name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Verify DLL integrity checksums
        run: powershell -ExecutionPolicy Bypass -File scripts/VerifyChecksums.ps1

      - name: Restore
        run: dotnet restore OpenCV5Sharp.slnx

      - name: Build
        run: dotnet build OpenCV5Sharp.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test OpenCV5Sharp.slnx --no-build -c Release --settings tests/coverlet.runsettings

      - name: Pack
        run: dotnet pack src/OpenCV5Sharp/OpenCV5Sharp.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }}

      - name: NuGet Login (OIDC Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Qourex

      - name: Publish NuGet packages to NuGet.org
        run: |
          dotnet nuget push **/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push **/*.snupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          dotnet CycloneDX src/OpenCV5Sharp/OpenCV5Sharp.csproj -o . -f sbom.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.nupkg
            **/*.snupkg
            sbom.json
