name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # =========================================================================
  # JOB 1: Build Native C++ Wrapper & OpenCV 5 for Linux, macOS, iOS, Android
  # =========================================================================
  build-native:
    name: Build Native (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            opencv_extra_flags: ""
            cmake_flags: "-DWITH_CUDA=OFF -DWITH_CUDNN=OFF"
            artifact_name: "native-linux-x64"

          - os: osx
            arch: x64
            runner: macos-15-intel
            opencv_extra_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            cmake_flags: "-DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64"
            artifact_name: "native-osx-x64"

          - os: osx
            arch: arm64
            runner: macos-latest
            opencv_extra_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            cmake_flags: "-DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DCMAKE_OSX_ARCHITECTURES=arm64"
            artifact_name: "native-osx-arm64"

          - os: android
            arch: arm64
            runner: ubuntu-latest
            opencv_extra_flags: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21"
            cmake_flags: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DWITH_CUDA=OFF -DWITH_CUDNN=OFF"
            artifact_name: "native-android-arm64"

          - os: ios
            arch: arm64
            runner: macos-latest
            opencv_extra_flags: "-DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64"
            cmake_flags: "-DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DWITH_CUDA=OFF -DWITH_CUDNN=OFF"
            artifact_name: "native-ios-arm64"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Build OpenCV 5 Minimal
      run: |
        mkdir opencv_build
        cd opencv_build
        cmake ../opencv -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install -DBUILD_SHARED_LIBS=ON -DBUILD_opencv_world=ON -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOCS=OFF -DWITH_CUDA=OFF -DWITH_CUDNN=OFF ${{ matrix.opencv_extra_flags }}
        cmake --build . --config Release --target install --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)

    - name: Configure Native Wrapper
      run: |
        mkdir native_build
        cd native_build
        cmake ../src/OpenCV5Sharp.Native -DCMAKE_BUILD_TYPE=Release -DOpenCV_DIR=../opencv_build/install ${{ matrix.cmake_flags }}

    - name: Build Native Wrapper
      run: |
        cd native_build
        cmake --build . --config Release

    - name: Stage Native Artifacts
      shell: pwsh
      run: |
        mkdir staged_binaries
        if ("${{ matrix.os }}" -eq "linux" -or "${{ matrix.os }}" -eq "android") {
          Copy-Item -Path "native_build/libopencv5sharp_native.so" -Destination "staged_binaries" -Force
          $worldPath = Get-ChildItem -Path "opencv_build/install/lib" -Filter "libopencv_world.so*" | Select-Object -First 1
          if ($worldPath) {
            Copy-Item -Path $worldPath.FullName -Destination "staged_binaries/libopencv_world500.so" -Force
          }
        } else {
          Copy-Item -Path "native_build/libopencv5sharp_native.dylib" -Destination "staged_binaries" -Force
          $worldPath = Get-ChildItem -Path "opencv_build/install/lib" -Filter "libopencv_world*.dylib" | Select-Object -First 1
          if ($worldPath) {
            Copy-Item -Path $worldPath.FullName -Destination "staged_binaries/libopencv_world500.dylib" -Force
          }
        }

    - name: Upload Native Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: staged_binaries/
        retention-days: 1

  # =========================================================================
  # JOB 2: Pack and Publish CPU & GPU NuGet Packages
  # =========================================================================
  pack-and-publish:
    name: Package & Publish NuGet
    needs: build-native
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Extract Release Version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
          $tag = $version
          if ($version -match '^[0-9]') {
            $tag = "v$version"
          }
          $version = $version -replace '^v', ''
        } else {
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag = "${{ github.ref_name }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG=$tag" >> $env:GITHUB_OUTPUT

    # Download compiled libraries into runtimes
    - name: Download Linux-x64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-linux-x64
        path: src/OpenCV5Sharp/runtimes/linux-x64/native

    - name: Download OSX-x64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-osx-x64
        path: src/OpenCV5Sharp/runtimes/osx-x64/native

    - name: Download OSX-Arm64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-osx-arm64
        path: src/OpenCV5Sharp/runtimes/osx-arm64/native

    - name: Download Android-Arm64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-android-arm64
        path: src/OpenCV5Sharp/runtimes/android-arm64/native

    - name: Download iOS-Arm64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-ios-arm64
        path: src/OpenCV5Sharp/runtimes/ios-arm64/native

    - name: Restore dependencies
      run: dotnet restore OpenCV5Sharp.slnx

    - name: Build Managed Assemblies
      run: dotnet build OpenCV5Sharp.slnx -c Release /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Run unit tests
      run: dotnet test tests/OpenCV5Sharp.Tests/OpenCV5Sharp.Tests.csproj -c Release --no-build

    - name: Pack Cross-Platform NuGet (CPU)
      run: dotnet pack src/OpenCV5Sharp/OpenCV5Sharp.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

    # Note: GPU version packs whatever Windows and Linux CUDA binaries are committed in its runtimes directory
    - name: Pack GPU NuGet (Windows & Linux CUDA)
      run: dotnet pack src/OpenCV5Sharp.Gpu/OpenCV5Sharp.Gpu.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

    - name: NuGet Login (OIDC Trusted Publishing)
      uses: NuGet/login@v1
      id: login
      with:
        user: cybowolf

    - name: Push to NuGet
      run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.TAG }}
        generate_release_notes: true
        files: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
