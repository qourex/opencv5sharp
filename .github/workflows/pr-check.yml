name: PR Validation

on:
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore workloads
        run: dotnet workload restore

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Verify DLL integrity checksums
        run: powershell -ExecutionPolicy Bypass -File scripts/VerifyChecksums.ps1

      - name: Verify code formatting
        run: dotnet format OpenCV5Sharp.slnx --verify-no-changes

      - name: Restore dependencies
        run: dotnet restore OpenCV5Sharp.slnx

      - name: Build (Debug)
        run: dotnet build OpenCV5Sharp.slnx -c Debug --no-restore

      - name: Test (Debug)
        run: dotnet test OpenCV5Sharp.slnx --no-build -c Debug --logger:"console;verbosity=detailed"
